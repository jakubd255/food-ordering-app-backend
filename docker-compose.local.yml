version: "3.9"
services:
  app:
    image: food-ordering-app-backend
    ports:
      - "8080:8080"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_URL=jdbc:postgresql://postgres:5432/food_ordering_app
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - food-ordering-app-backend-volume:/app/uploads
    container_name: food-ordering-app-backend
    depends_on:
      - postgres
  postgres:
    image: postgres
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: food_ordering_app
    ports:
      - "5432:5432"
    volumes:
      - postgres-volume:/var/lib/postgresql/data
volumes:
  food-ordering-app-backend-volume:
    name: food-ordering-app-backend-volume
  postgres-volume:
    name: postgres-volume